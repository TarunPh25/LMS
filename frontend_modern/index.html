<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS Student Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>LMS Pro</span>
            </div>

            <ul class="nav-links">
                <li class="active" onclick="filterStudents('all')">
                    <i class="fa-solid fa-users"></i>
                    <span>All Students</span>
                </li>
                <li onclick="filterStudents('active')">
                    <i class="fa-solid fa-user-check"></i>
                    <span>Active</span>
                </li>
                <li onclick="filterStudents('inactive')">
                    <i class="fa-solid fa-user-slash"></i>
                    <span>Inactive</span>
                </li>
                <li onclick="filterStudents('graduated')">
                    <i class="fa-solid fa-user-graduate"></i>
                    <span>Graduated</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-title">
                    <h1>Student Directory</h1>
                    <p>Manage your students efficiently</p>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search students..." onkeyup="handleSearch()">
                    </div>
                    <button class="btn btn-primary" onclick="openModal('create')">
                        <i class="fa-solid fa-plus"></i> Add Student
                    </button>
                </div>
            </header>

            <!-- Stats Cards -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon bg-blue">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Total Students</h3>
                        <p id="totalCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-green">
                        <i class="fa-solid fa-user-check"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Active</h3>
                        <p id="activeCount">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon bg-purple">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Graduated</h3>
                        <p id="graduatedCount">0</p>
                    </div>
                </div>
            </div>

            <!-- Student List -->
            <div class="student-list-container">
                <div class="table-header">
                    <div>Name</div>
                    <div>Email & Phone</div>
                    <div>Enrolled</div>
                    <div>Status</div>
                    <div>Actions</div>
                </div>
                <div id="studentList" class="student-list">
                    <!-- Student items injected here via JS -->
                    <div class="loading-spinner">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Backdrop -->
    <div id="modalBackdrop" class="modal-backdrop hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Student</h2>
                <button class="close-btn" onclick="closeModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="studentForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="studentId">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" required placeholder="Doe">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="john.doe@example.com">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+1 234 567 8900">
                        </div>
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                            <option value="suspended">Suspended</option>
                            <option value="graduated">Graduated</option>
                        </select>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Student</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <div class="toast-icon">
            <i class="fa-solid fa-check-circle"></i>
        </div>
        <div class="toast-message">Success!</div>
    </div>

    <script src="app.js"></script>
</body>

</html>
